name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "issue-*-v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-ocr.txt
            requirements-build.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-ocr.txt -r requirements-build.txt

      - name: Run full test suite
        run: python -m unittest discover -s tests -v

      - name: Build Windows application
        run: python -m PyInstaller --clean --noconfirm BossOCR.spec

      - name: Run safe executable smoke test
        shell: powershell
        run: .\dist\BossOCR\BossOCR.exe --no-forward --auto --duration-seconds 0

      - name: Create release archive and checksum
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path dist\BossOCR\* -DestinationPath release\BossOCR-Windows-x64.zip -CompressionLevel Optimal
          (Get-FileHash release\BossOCR-Windows-x64.zip -Algorithm SHA256).Hash | Out-File release\BossOCR-Windows-x64.zip.sha256 -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BossOCR-Windows-x64
          path: |
            release/BossOCR-Windows-x64.zip
            release/BossOCR-Windows-x64.zip.sha256
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" release\BossOCR-Windows-x64.zip release\BossOCR-Windows-x64.zip.sha256 --title "Issue #1 BossOCR minimal changes v1.0" --notes-file release-notes\Issue-1-BossOCR-release-notes.md
